{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'styles/login.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        
        <form action="{% url 'user:login' %}" method="POST">
            {% csrf_token %}
            {% comment %} hidden input {% endcomment %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Login</button>
            </div>
        </form>

        {% comment %} Display error message if login fails {% endcomment %}
        {% if error %}
            <p style="color: red;" class="errormessage">{{ error }}</p>
        {% endif %}
        <p>Don't have an account? <a href="{% url 'user:register' %}">Register here</a></p>
        <span class='forgot_password'><a href="{% url 'user:forgot_password' %}">Forgot Password</a></span>

    </div>
</body>
</html>
