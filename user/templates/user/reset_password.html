{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="{% static 'styles/reset_password.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Reset Password</h2>
        <p class="subtitle">Create a new secure password for your account</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if messages %}
            {% for message in messages %}
                <div class="success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-box">
                <input type="password" name="password1" placeholder="New Password" required>
            </div>

            <div class="input-box">
                <input type="password" name="password2" placeholder="Confirm Password" required>
            </div>

            <button type="submit">Reset Password</button>
        </form>

        <div class="links">
            <a href="{% url 'user:login' %}">Back to Login</a>
        </div>

    </div>

</div>

</body>
</html>
