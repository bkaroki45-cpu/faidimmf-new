{% extends "admin/change_list.html" %}

{% block content %}

<div style="display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap;">

    <!-- TODAY -->
    <div style="flex:1; min-width:250px; padding:15px; background:#066cb5; border-radius:10px;">
        <h3>📅 Today</h3>
        <p><strong>Deposits:</strong> {{ total_deposited_today }}</p>
        <p><strong>Withdrawals:</strong> {{ total_withdrawn_today }}</p>
    </div>

    <!-- MONTH -->
    <div style="flex:1; min-width:250px; padding:15px; background:#0fde21; border-radius:10px;">
        <h3>📊 This Month</h3>
        <p><strong>Deposits:</strong> {{ total_deposited_month }}</p>
        <p><strong>Withdrawals:</strong> {{ total_withdrawn_month }}</p>
    </div>

</div>

{{ block.super }}

{% endblock %}
